<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
<h:head>
    <title>Registrazione</title>
</h:head>
<h:body>
    <h2>Registrati</h2>
    <h:form>
        <h:panelGrid columns="2">
            <h:outputLabel for="regUsername">Username:</h:outputLabel>
            <h:inputText id="regUsername" value="#{registerBean.username}" required="true" />

            <h:outputLabel for="regEmail">Email:</h:outputLabel>
            <h:inputText id="regEmail" value="#{registerBean.email}" required="true" />

            <h:outputLabel for="regPassword">Password:</h:outputLabel>
            <h:inputSecret id="regPassword" value="#{registerBean.password}" required="true" />

            <h:outputLabel for="confirmPassword">Conferma Password:</h:outputLabel>
            <h:inputSecret id="confirmPassword" value="#{registerBean.confirmPassword}" required="true" />
        </h:panelGrid>
        <h:commandButton value="Registrati" action="#{registerBean.doRegister()}" />
        <h:messages globalOnly="true" style="color: blue;" />
    </h:form>
</h:body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fanta F1 - Benvenuto</title>
  <style>

    body {
      margin: 0;
      background: linear-gradient(135deg, #000000, #1c1c1c);
      font-family: 'Roboto', sans-serif;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      background-image: url("images/neoncar.jpeg");
      background-size: cover;        /* Adatta l'immagine per coprire tutto lo sfondo */
      background-repeat: no-repeat;  /* Evita la ripetizione */
      background-position: center;
    }
    body::before {
    content: "";
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: repeating-linear-gradient(
        45deg,
        rgba(255, 255, 255, 0.05),
        rgba(255, 255, 255, 0.05) 1px,
        transparent 1px,
        transparent 4px
    );
    z-index: 0;
    animation: moveBg 1s linear infinite;
    }

    @keyframes moveBg {
    0% { background-position: 0 0; }
    100% { background-position: 100px 100px; }
    }

    header {
      font-family: 'Arial Black', sans-serif;
      font-size: 4rem;
      color: #f7f6f6;
      text-shadow: 0 0 10px #e10600;
      margin-bottom: 0.3em;
      letter-spacing: 0.15em;
    }

    h2 {
      font-weight: 400;
      color: #ddd;
      margin-bottom: 2em;
      font-family: Arial Black, Helvetica, sans-serif;
    }

    .button-container {
      display: flex;
      gap: 2rem;
    }
    /* From Uiverse.io by nikk7007 */ 
    .slice {
      --c1: #202020;
      --c2: #e6e7e7;
      --size-letter: 32px;
      padding: 0.5em 1em;
      font-size: var(--size-letter);

      background-color: transparent;
      border: calc(var(--size-letter) / 6) solid var(--c2);
      border-radius: 0.2em;
      cursor: pointer;

      overflow: hidden;
      position: relative;
      transition: 300ms cubic-bezier(0.83, 0, 0.17, 1);

      & > .text {
        font-weight: 700;
        color: var(--c2);
        position: relative;
        z-index: 1;
        transition: color 700ms cubic-bezier(0.83, 0, 0.17, 1);
      }
    }

    .slice::after {
      content: "";

      width: 0;
      height: calc(300% + 1em);

      position: absolute;
      translate: -50% -50%;
      inset: 50%;
      rotate: 30deg;

      background-color: var(--c2);
      transition: 1000ms cubic-bezier(0.83, 0, 0.17, 1);
    }

    .slice:hover {
      & > .text {
        color: var(--c1);
      }
      &::after {
        width: calc(120% + 1em);
      }
    }

    .slice:active {
      scale: 0.98;
      filter: brightness(0.9);
    }

    button {
      background-color: #e10600;
      border: none;
      padding: 1em 3em;
      font-size: 1.2rem;
      font-weight: 700;
      color: white;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 0 15px #e10600aa;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: background-color 0.3s ease, box-shadow 0.3s ease;
      min-width: 140px;
      width: 20em;
      height: 3em;
    }

    button:hover {
      background-color: #b30500;
      box-shadow: 0 0 25px #b30500cc;
    }

    footer {
      position: absolute;
      bottom: 1em;
      font-size: 0.8rem;
      color: #555;
      font-style: italic;
    }
  </style>

		
</head>
<body>
  <header>FANTA F1</header>
  <h2>Welcome</h2>

  <button class="slice" id="letsRace" onclick="window.location.href='login.jsp'">
    <span class="text">Let's Race</span>
  </button>

  <footer>2025 Fanta F1 - Powered by LMosca, BGregge, LZana</footer>
</body>
</html>

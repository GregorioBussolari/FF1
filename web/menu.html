<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Formula 1 Manager</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0e0e0e;
      color: #fff;
    }

    header {
      background-color: #d00000;
      padding: 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 2.5em;
    }

    .container {
      display: flex;
      justify-content: space-around;
      padding: 30px;
      gap: 20px;
      flex-wrap: wrap;
    }

    .box {
      position: relative;
      width: 450px;
      height: 600px;
      border: 2px solid #ff0000;
      box-shadow: 0 0 15px #ff0000;
      border-radius: 10px;
      overflow: hidden;
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.6);
    }

    .box-content {
      position: relative;
      z-index: 2;
      text-align: center;
    }

    .box-content button {
      background-color: #d00000;
      color: #fff;
      border: none;
      padding: 12px 20px;
      font-size: 1em;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .box-content button:hover {
      background-color: #a30000;
    }

    footer {
      text-align: center;
      padding: 20px;
      background-color: #111;
      color: #aaa;
    }

    /* Immagini di sfondo diverse per ogni box */
    #creazioneLega {
      background-image: url('images/blackcar2.jpg');
    }

    #creazioneSquadra {
      background-image: url('images/redcar.jpg');
    }

    #iscrizioneLega {
      background-image: url('images/whitecar.jpg');
    }
    
    #leTueLeghe {
      background-image: url('images/blackcar.jpg');
    }
    
    #leTueSquadre {
      background-image: url('images/silvercar.png');
    }
    
    #regolamento {
      background-image: url('images/regolamento.png');
    }
    
    button {
      position: relative;
      padding: 10px 20px;
      border-radius: 7px;
      border: 1px solid rgb(238, 65, 7);
      font-size: 14px;
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 2px;
      background: transparent;
      color: #fff;
      overflow: hidden;
      box-shadow: 0 0 0 0 transparent;
      -webkit-transition: all 0.2s ease-in;
      -moz-transition: all 0.2s ease-in;
      transition: all 0.2s ease-in;
    }

    button:hover {
      background: rgb(255, 61, 61);
      box-shadow: 0 0 30px 5px rgba(236, 0, 0, 0.815);
      -webkit-transition: all 0.2s ease-out;
      -moz-transition: all 0.2s ease-out;
      transition: all 0.2s ease-out;
    }

    button:hover::before {
      -webkit-animation: sh02 0.5s 0s linear;
      -moz-animation: sh02 0.5s 0s linear;
      animation: sh02 0.5s 0s linear;
    }

    button::before {
      content: '';
      display: block;
      width: 0px;
      height: 86%;
      position: absolute;
      top: 7%;
      left: 0%;
      opacity: 0;
      background: #fff;
      box-shadow: 0 0 50px 30px #fff;
      -webkit-transform: skewX(-20deg);
      -moz-transform: skewX(-20deg);
      -ms-transform: skewX(-20deg);
      -o-transform: skewX(-20deg);
      transform: skewX(-20deg);
    }

    @keyframes sh02 {
      from {
        opacity: 0;
        left: 0%;
      }

      50% {
        opacity: 1;
      }

      to {
        opacity: 0;
        left: 100%;
      }
    }

    button:active {
      box-shadow: 0 0 0 0 transparent;
      -webkit-transition: box-shadow 0.2s ease-in;
      -moz-transition: box-shadow 0.2s ease-in;
      transition: box-shadow 0.2s ease-in;
    }
    body::before {
    content: "";
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: repeating-linear-gradient(
        45deg,
        rgba(255, 255, 255, 0.05),
        rgba(255, 255, 255, 0.05) 1px,
        transparent 1px,
        transparent 4px
    );
    z-index: 0;
    animation: moveBg 1s linear infinite;
    }

    @keyframes moveBg {
    0% { background-position: 0 0; }
    100% { background-position: 100px 100px; }
    }
    
    body > * {
  position: relative;
  z-index: 1;
}
     

   


  </style>
</head>

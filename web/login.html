<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - F1 Racing Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url("images/neoncar.jpeg");
            background-size: cover;        /* Adatta l'immagine per coprire tutto lo sfondo */
            background-repeat: no-repeat;  /* Evita la ripetizione */
            background-position: center;   /* Centra l'immagine */
            font-family: 'Orbitron', sans-serif;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Animazione fadeIn + slide dall'alto */
        @keyframes fadeSlideIn {
            0% {
                opacity: 0;
                transform: translateY(-40px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-container {
            background: #121212;
            border: 3px solid #e10600; /* Rosso Formula 1 */
            border-radius: 12px;
            padding: 40px 50px;
            width: 320px;
            box-shadow: 0 0 20px #e10600cc;
            text-align: center;
            animation: fadeSlideIn 0.7s ease forwards;
        }

        .logo {
            width: 150px;              
            height: 150px;                    
            background-image: url("images/logoFF1_small.png");
            background-size: contain;        
            background-repeat: no-repeat;   
            background-position: center;
              
        }
        .container {
            display: flex;
            justify-content: center;  /* centro orizzontale */
            align-items: center;      /* centro verticale */
        }


        /* Logo F1 semplice - SVG */
        .logo svg {
            width: 150px;
            height: auto;
            fill: #e10600;
            filter: drop-shadow(0 0 5px #e10600aa);
        }

        .login-container h1 {
            margin-bottom: 30px;
            font-size: 2.2rem;
            letter-spacing: 2px;
        }

        label {
            display: block;
            text-align: left;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 20px;
            border: 2px solid #444;
            border-radius: 6px;
            background: #222;
            color: #eee;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: #e10600;
            outline: none;
            background: #1a1a1a;
        }

        button {
            width: 100%;
            padding: 14px 0;
            background-color: #e10600;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #b00400;
        }

        .footer-text {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #888;
        }

        .footer-text a {
            color: #e10600;
            text-decoration: none;
            font-weight: 600;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="container">
            <div class="logo" aria-label="Logo F1 Racing"></div>
        </div>
        <h1>Fanta Formula 1</h1>
        <form action="LoginServlet" method="POST">
            <label for="username">Nome utente</label>
            <input type="text" id="username" name="username" placeholder="Inserisci nome utente" required />

            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Inserisci password" required />

            <button type="submit">Accedi</button>
        </form>

        <div class="footer-text">
            Non hai un account? <a href="/register">Registrati</a>
        </div>
    </div>

</body>
</html>
